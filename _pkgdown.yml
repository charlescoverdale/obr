url: https://charlescoverdale.github.io/obr/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/charlescoverdale/obr

articles:
  - title: Vignettes
    navbar: ~
    contents:
      - vintages
      - policy-measures
      - forecast-revisions

reference:
  - title: Public Finances Databank
    desc: Outturn data on borrowing, debt, receipts, and expenditure since 1946.
    contents:
      - get_public_finances
      - get_psnb
      - get_psnd
      - get_expenditure
      - get_receipts

  - title: Historical Official Forecasts
    desc: Every OBR forecast since 2010 for key fiscal and economic variables.
    contents:
      - list_forecast_series
      - get_forecasts
      - obr_forecast_panel
      - get_forecast_revisions

  - title: Economic and Fiscal Outlook
    desc: Five-year projections from the latest Budget.
    contents:
      - get_efo_fiscal
      - get_efo_economy
      - list_efo_economy_measures

  - title: Welfare Trends Report
    desc: Incapacity benefit spending and caseloads.
    contents:
      - get_welfare_spending
      - get_incapacity_spending
      - get_incapacity_caseloads

  - title: Fiscal Risks and Sustainability Report
    desc: 50-year state pension projections.
    contents:
      - get_pension_projections

  - title: Policy Measures Database
    desc: Every UK fiscal-event-scored tax measure since 1970 and spending measure since 2010.
    contents:
      - get_policy_measures
      - policy_measures_summary

  - title: Fiscal rules
    desc: Charter for Budget Responsibility rule definitions.
    contents:
      - obr_fiscal_rules

  - title: Vintage layer
    desc: Pin analyses to a specific OBR Economic and Fiscal Outlook for reproducibility.
    contents:
      - obr_efo_vintages
      - obr_as_of
      - obr_pin
      - obr_unpin
      - obr_pinned

  - title: Provenance
    desc: Inspect and manage the source metadata attached to every returned object.
    contents:
      - obr_provenance
      - print.obr_tbl
      - summary.obr_tbl
      - "`[.obr_tbl`"
      - as.data.frame.obr_tbl

  - title: Cache management
    desc: Manage locally cached OBR data files.
    contents:
      - clear_cache

  - title: "Package"
    contents:
      - obr-package
